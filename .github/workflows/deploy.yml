name: Deploy to Cloudflare Workers

# Deploys on every push to main and runs the same build as a check on every
# PR into main. All real builds happen here on Linux; OpenNext has known
# Windows build issues, so local Windows builds are not the deploy path.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build (PR check only)
        if: github.event_name == 'pull_request'
        run: npx opennextjs-cloudflare build

      - name: Build and deploy
        if: github.event_name == 'push'
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
